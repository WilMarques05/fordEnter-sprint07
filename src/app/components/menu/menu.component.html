<div class="d-flex">
  <div class="offcanvas-md offcanvas-start bg-dark text-white sidebar-fixa" 
       tabindex="-1" 
       id="sidebarMenu" 
       aria-labelledby="sidebarMenuLabel">
    <picture class="container-logo">
      <img class="img-logo" src="logoFord.png" alt="logoFord">
    </picture>
    
    <div class="offcanvas-header border-bottom border-secondary">
      <button type="button" class="btn-close btn-close-white d-md-none" data-bs-dismiss="offcanvas" data-bs-target="#sidebarMenu" aria-label="Fechar"></button>
    </div>
    <!-- Links de Navegação -->
    <div class="offcanvas-body d-flex flex-column p-0">
      <ul class="nav nav-pills flex-column mb-auto p-3 w-100">
        <li class="nav-item mb-2">
          <a routerLink="/home" routerLinkActive="active" class="nav-link text-white d-flex align-items-center gap-2">
            <span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-house-door" viewBox="0 0 16 16">
  <path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h2v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM2.5 14V7.707l5.5-5.5 5.5 5.5V14H10v-4a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5v4z"/>
</svg></span> Home
          </a>
        </li>
        <li class="nav-item mb-2">
          <a routerLink="/dashboard" routerLinkActive="active" class="nav-link text-white d-flex align-items-center gap-2">
            <span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-speedometer" viewBox="0 0 16 16">
  <path d="M8 2a.5.5 0 0 1 .5.5V4a.5.5 0 0 1-1 0V2.5A.5.5 0 0 1 8 2M3.732 3.732a.5.5 0 0 1 .707 0l.915.914a.5.5 0 1 1-.708.708l-.914-.915a.5.5 0 0 1 0-.707M2 8a.5.5 0 0 1 .5-.5h1.586a.5.5 0 0 1 0 1H2.5A.5.5 0 0 1 2 8m9.5 0a.5.5 0 0 1 .5-.5h1.5a.5.5 0 0 1 0 1H12a.5.5 0 0 1-.5-.5m.754-4.246a.39.39 0 0 0-.527-.02L7.547 7.31A.91.91 0 1 0 8.85 8.569l3.434-4.297a.39.39 0 0 0-.029-.518z"/>
  <path fill-rule="evenodd" d="M6.664 15.889A8 8 0 1 1 9.336.11a8 8 0 0 1-2.672 15.78zm-4.665-4.283A11.95 11.95 0 0 1 8 10c2.186 0 4.236.585 6.001 1.606a7 7 0 1 0-12.002 0"/>
</svg></span> Dashboard
          </a>
        </li>
      </ul>
      
      <div class="p-3 border-top border-secondary mt-auto nav-item-btn">
        <button (click)="logout()"  class="btn btn-danger w-100 d-flex align-items-center justify-content-center gap-2">
            <span><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-door-open" viewBox="0 0 16 16">
  <path d="M8.5 10c-.276 0-.5-.448-.5-1s.224-1 .5-1 .5.448.5 1-.224 1-.5 1"/>
  <path d="M10.828.122A.5.5 0 0 1 11 .5V1h.5A1.5 1.5 0 0 1 13 2.5V15h1.5a.5.5 0 0 1 0 1h-13a.5.5 0 0 1 0-1H3V1.5a.5.5 0 0 1 .43-.495l7-1a.5.5 0 0 1 .398.117M11.5 2H11v13h1V2.5a.5.5 0 0 0-.5-.5M4 1.934V15h6V1.077z"/>
</svg></span> Sair
        </button>
      </div>

    </div>
  </div>

  <div class="flex-grow-1 min-vh-100 bg-light p-4" id="main-content">
    <!-- Botão de Hambúrguer (Só aparece e controla o menu em telas menores que MD) -->
    <button class="btn btn-dark d-md-none mb-3 d-flex align-items-center gap-2 btn-menu-hamburguer" 
            type="button" 
            data-bs-toggle="offcanvas" 
            data-bs-target="#sidebarMenu" 
            aria-controls="sidebarMenu">
      <span>☰</span> Menu
    </button>
    <router-outlet></router-outlet>
  </div>
</div>
