<div class="container-fluid py-4 container-dashboard">
  
  <div class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body">
      <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3">
        <h2 class="fw-bold text-primary mb-0">
          <i class="bi bi-car-front-fill me-2"></i>
          Veículos
        </h2>

        <div class="w-100" style="max-width: 300px">
  <select 
    class="form-select rounded-3" 
    [value]="veiculoSelecionado.id" 
    (change)="onVeiculoChange($event)">
    
    @for (item of listaVeiculos; track item.id) {
      <option [value]="item.id">{{ item.vehicle }}</option>
    }
  </select>
</div>
      </div>
    </div>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-12 col-md-6 col-xl-4">
      <app-card [titulo]="'Total de vendas'" [informacoes]="veiculoSelecionado.volumetotal"></app-card>
    </div>
    <div class="col-12 col-md-6 col-xl-4">
      <app-card titulo="Conectados" [informacoes]="veiculoSelecionado.connected"></app-card>
    </div>
    <div class="col-12 col-md-6 col-xl-4">
      <app-card titulo="Upd. Software" [informacoes]="veiculoSelecionado.softwareUpdates"></app-card>
    </div>
  </div>

  <div class="card shadow-sm border-0 rounded-4 mb-4">
    <div class="card-body text-center">
      <img [src]="veiculoSelecionado.img" class="img-fluid" style="max-height: 350px; width: auto" alt="img veiculo" />
    </div>
  </div>

  <div class="card shadow-sm border-0 rounded-4">
    <div class="card-header bg-primary text-white rounded-top-4">
      <h5 class="mb-0"><i class="bi bi-speedometer2 me-2"></i> Informações do veículo</h5>
    </div>

    <div class="card-body">
      @if (dadosVin) {
        <div class="table-responsive w-100">
          <table class="table table-hover align-middle table-sm tabela-veiculo">
            <thead>
              <tr>
                <th><i class="bi bi-upc-scan me-1"></i>VIN</th>
                <th><i class="bi bi-speedometer me-1"></i>Odômetro</th>
                <th><i class="bi bi-fuel-pump-fill me-1"></i>Combustível</th>
                <th><i class="bi bi-power me-1"></i>Status</th>
                <th><i class="bi bi-geo-alt-fill me-1"></i>Latitude</th>
                <th><i class="bi bi-geo-fill me-1"></i>Longitude</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style="min-width: 240px">
                  <input
                    type="text"
                    class="form-control form-control-sm text-uppercase fw-semibold"
                    [(ngModel)]="vinAtual"
                    (input)="onVinDigitado()"
                    placeholder="Digite o código VIN..."
                  />
                </td>
                <td>{{ dadosVin.odometro | number }} km</td>
                <td><span class="badge bg-success"> {{ dadosVin.nivelCombustivel }}% </span></td>
                <td>
                  <span class="badge text-uppercase" [ngClass]="dadosVin.status === 'on' ? 'bg-primary' : 'bg-danger'">
                    {{ dadosVin.status }}
                  </span>
                </td>
                <td>{{ dadosVin.lat }}</td>
                <td>{{ dadosVin.long }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      } @else {
        <div class="text-center py-4">
          <div class="spinner-border text-primary spinner-border-sm" role="status"></div>
          <span class="ms-2 text-muted small">Carregando dados...</span>
        </div>
      }
    </div>
  </div>
</div>
